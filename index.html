<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora de Corridas taxi RJ</title>
    <meta
      name="description"
      content="Calculadora de Corridas taxi RJ para Android."
    />
    <style>
      :root {
        color-scheme: light;
        --yellow: #ffd23f;
        --ink: #111317;
        --muted: rgba(17, 19, 23, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        background: var(--yellow);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
      }

      .download-page {
        align-items: center;
        display: grid;
        min-height: 100svh;
        padding: 22px 18px;
      }

      .download-box {
        margin: 0 auto;
        max-width: 360px;
        text-align: center;
        width: 100%;
      }

      h1 {
        font-size: clamp(1.24rem, 6vw, 2rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.08;
        margin: 0 0 24px;
      }

      .download-button {
        align-items: center;
        background: var(--ink);
        border: 0;
        border-radius: 14px;
        box-shadow: 0 16px 28px rgba(17, 19, 23, 0.2);
        color: #ffffff;
        display: flex;
        font-size: 1.04rem;
        font-weight: 800;
        justify-content: center;
        min-height: 58px;
        padding: 0 24px;
        text-decoration: none;
        width: 100%;
      }

      .download-button:active {
        transform: translateY(1px);
      }

      .version {
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 700;
        margin: 14px 0 0;
      }
    </style>
  </head>
  <body>
    <main class="download-page">
      <section class="download-box" aria-labelledby="app-title">
        <h1 id="app-title">Calculadora de Corridas taxi RJ</h1>
        <a class="download-button" href="https://raw.githubusercontent.com/recibodigitalapp-pixel/calculadora/main/CalculadoraDeCorridas-Mapa.apk" download="CalculadoraDeCorridas.apk">
          Baixar app
        </a>
        <p class="version">Versao 2.7</p>
      </section>
    </main>
  </body>
</html>
